name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Configure Windows code signing
        if: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          "CSC_LINK=${{ secrets.WINDOWS_CERT_PFX_BASE64 }}" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CERT_PASSWORD }}" >> $env:GITHUB_ENV

      - name: Build Windows App
        env:
          GH_TOKEN: ${{ secrets.RELEASES_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm run release:win
